<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot with Parallax</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}

body, html {height:100%;overflow-x:hidden;}

/* Parallax Sections */
.parallax {
  height:100vh;
  background-attachment: fixed;
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
}

.parallax1 {background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');}
.parallax2 {background-image: url('https://images.unsplash.com/photo-1492724441997-5dc865305da7');}

.content {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#111;
  color:#fff;
}

/* Chatbot UI */
.chat-container {
  width:350px;
  height:500px;
  background:#fff;
  border-radius:10px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.chat-header {
  background:#4CAF50;
  color:white;
  padding:15px;
  text-align:center;
}

.chat-box {
  flex:1;
  padding:10px;
  overflow-y:auto;
}

.message {
  margin:10px 0;
  padding:12px 15px;
  border-radius:12px;
  max-width:75%;
  font-size:15px;
  line-height:1.5;
  word-wrap: break-word;
}

.user {
  background:#DCF8C6;
  align-self:flex-end;
  color:#000;
}

.bot {
  background:#f1f1f1;
  align-self:flex-start;
  color:#000;
}

.chat-box {
  flex:1;
  padding:15px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:5px;
  background:#fafafa;
}

.user {background:#DCF8C6;align-self:flex-end;}
.bot {background:#eee;align-self:flex-start;}

.chat-input {
  display:flex;
  border-top:1px solid #ccc;
}

.chat-input input {
  flex:1;
  padding:10px;
  border:none;
  outline:none;
}

.chat-input button {
  padding:10px;
  background:#4CAF50;
  color:white;
  border:none;
  cursor:pointer;
}

</style>
</head>
<body>

<div class="parallax parallax1"></div>

<div class="content">
  <div class="chat-container">
    <div class="chat-header">AI Chatbot</div>
    <div class="chat-box" id="chatBox"></div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Type a message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<div class="parallax parallax2"></div>

<script>
function sendMessage(){
  let input = document.getElementById("userInput");
  let message = input.value.trim();
  if(message === "") return;

  appendMessage(message, "user");
  input.value = "";

  setTimeout(()=>{
    let reply = botReply(message);
    appendMessage(reply, "bot");
  }, 500);
}

function appendMessage(text, type){
  let chatBox = document.getElementById("chatBox");
  let msg = document.createElement("div");
  msg.classList.add("message", type);
  msg.innerText = text;
  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function botReply(input){
  input = input.toLowerCase();

  if(input.includes("hello")) return "Hi there!";
  if(input.includes("how are you")) return "I'm just code, but I'm doing great!";
  if(input.includes("bye")) return "Goodbye! Have a nice day!";

  return "Sorry, I don't understand.";
}
</script>

</body>
</html>
